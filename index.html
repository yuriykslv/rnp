ue": 24233, "visits": 10}}};
const TODAY = "2026-05-29";
const YESTERDAY = "2026-05-28";
const FIRST_THIS = "2026-05-01";
const FIRST_PREV = "2026-04-01";
const DAYS_IN_MONTH = 31;
const DAY_OF_MONTH = 28;

let selectedBranch = "all";
let chart = null;

function fmt(v) {
    if (v >= 1e6) return (v/1e6).toFixed(1) + "M";
    if (v >= 1e3) return Math.round(v/1e3) + "K";
    return v.toLocaleString("ru-RU");
}
function fmtR(v) { return fmt(v) + " ₽"; }

function getDates(startStr, endStr) {
    const dates = [];
    let d = new Date(startStr);
    const end = new Date(endStr);
    while (d <= end) {
        dates.push(d.toISOString().slice(0,10));
        d.setDate(d.getDate() + 1);
    }
    return dates;
}

function branchIds() {
    if (selectedBranch === "all") return Object.keys(BRANCHES);
    return [selectedBranch];
}

function sumRange(start, end, filterDay) {
    let rev = 0, vis = 0;
    branchIds().forEach(cid => {
        const bd = DATA[cid] || {};
        Object.entries(bd).forEach(([d, v]) => {
            if (d >= start && d <= end) {
                if (filterDay && parseInt(d.slice(8,10)) > filterDay) return;
                rev += v.revenue;
                vis += v.visits;
            }
        });
    });
    return { rev, vis };
}

function sumRangeBranch(cid, start, end, filterDay) {
    let rev = 0, vis = 0;
    const bd = DATA[cid] || {};
    Object.entries(bd).forEach(([d, v]) => {
        if (d >= start && d <= end) {
            if (filterDay && parseInt(d.slice(8,10)) > filterDay) return;
            rev += v.revenue;
            vis += v.visits;
        }
    });
    return { rev, vis };
}

function renderChips() {
    const el = document.getElementById("chips");
    let html = '<span class="chip ' + (selectedBranch === "all" ? "active" : "") + '" onclick="selectBranch(\'all\')">Все</span>';
    Object.entries(BRANCHES).forEach(([cid, info]) => {
        html += '<span class="chip ' + (selectedBranch === cid ? "active" : "") + '" onclick="selectBranch(\'' + cid + '\')">' + info.name + '</span>';
    });
    el.innerHTML = html;
}

function renderKPI() {
    const curr = sumRange(FIRST_THIS, YESTERDAY);
    const prev = sumRange(FIRST_PREV, FIRST_THIS, DAY_OF_MONTH);
    const forecast = DAY_OF_MONTH > 0 ? (curr.rev / DAY_OF_MONTH) * DAYS_IN_MONTH : 0;
    const avgCheck = curr.vis > 0 ? curr.rev / curr.vis : 0;
    const delta = prev.rev > 0 ? ((curr.rev / prev.rev) - 1) * 100 : 0;
    const vpd = DAY_OF_MONTH > 0 ? Math.round(curr.vis / DAY_OF_MONTH) : 0;

    const netCurr = (() => {
        let r = 0, v = 0;
        Object.keys(BRANCHES).forEach(cid => {
            const bd = DATA[cid] || {};
            Object.entries(bd).forEach(([d, val]) => {
                if (d >= FIRST_THIS && d <= YESTERDAY) { r += val.revenue; v += val.visits; }
            });
        });
        return { rev: r, vis: v };
    })();

    const dSign = delta >= 0 ? "+" : "";
    const dBg = delta >= 0 ? "#86EFAC" : "#FCA5A5";
    const dFg = delta >= 0 ? "#065f46" : "#991b1b";

    document.getElementById("kpi").innerHTML = `
        <div class="kpi-cell">
            <div class="kpi-label">ВЫРУЧКА</div>
            <div class="kpi-value">${fmtR(curr.rev)}</div>
            <div class="kpi-sub">${DAY_OF_MONTH} из ${DAYS_IN_MONTH} дней</div>
            <div class="kpi-accent" style="background:#93AAFD"></div>
        </div>
        <div class="kpi-cell">
            <div class="kpi-label">ПРОГНОЗ</div>
            <div class="kpi-value">${fmtR(forecast)}</div>
            <div class="kpi-sub">на ${DAYS_IN_MONTH} дней</div>
            <div class="kpi-accent" style="background:#93C5FD"></div>
        </div>
        <div class="kpi-cell">
            <div class="kpi-label">ВИЗИТЫ</div>
            <div class="kpi-value">${curr.vis.toLocaleString("ru-RU")} <span class="kpi-badge" style="background:#86EFAC;color:#065f46">${vpd}/д</span></div>
            <div class="kpi-sub">с начала месяца</div>
            <div class="kpi-accent" style="background:#86EFAC"></div>
        </div>
        <div class="kpi-cell">
            <div class="kpi-label">СР.ЧЕК</div>
            <div class="kpi-value">${Math.round(avgCheck).toLocaleString("ru-RU")} ₽</div>
            <div class="kpi-sub">текущий месяц</div>
            <div class="kpi-accent" style="background:#FDE68A"></div>
        </div>
        <div class="kpi-cell">
            <div class="kpi-label">VS ПРОШЛЫЙ</div>
            <div class="kpi-value">${dSign}${delta.toFixed(1)}% <span class="kpi-badge" style="background:${dBg};color:${dFg}">${fmtR(prev.rev)}</span></div>
            <div class="kpi-sub">за ${DAY_OF_MONTH} дней</div>
            <div class="kpi-accent" style="background:#C4B5FD"></div>
        </div>
        <div class="kpi-cell">
            <div class="kpi-label">СЕТЬ</div>
            <div class="kpi-value">${fmtR(netCurr.rev)}</div>
            <div class="kpi-sub">${netCurr.vis.toLocaleString("ru-RU")} визитов</div>
            <div class="kpi-accent" style="background:#F9A8D4"></div>
        </div>
    `;
}

function renderChart() {
    const start60 = new Date(TODAY);
    start60.setDate(start60.getDate() - 60);
    const dates = getDates(start60.toISOString().slice(0,10), YESTERDAY);

    const values = dates.map(d => {
        let total = 0;
        branchIds().forEach(cid => {
            const bd = DATA[cid] || {};
            if (bd[d]) total += bd[d].revenue;
        });
        return total;
    });

    const colors = dates.map(d => {
        if (d >= FIRST_THIS) return "#93AAFD";
        if (d >= FIRST_PREV) return "#C7D2FE";
        return "#E0E7FF";
    });

    const labels = dates.map(d => parseInt(d.slice(8,10)));

    const avg = values.filter(v => v > 0).reduce((a,b) => a+b, 0) / values.filter(v => v > 0).length || 0;

    if (chart) chart.destroy();
    chart = new Chart(document.getElementById("chart"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: colors,
                borderRadius: 2,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                annotation: { annotations: { } },
                tooltip: {
                    callbacks: {
                        title: (items) => dates[items[0].dataIndex],
                        label: (item) => item.raw.toLocaleString("ru-RU") + " ₽"
                    }
                }
            },
            scales: {
                x: { grid: { display: false }, ticks: { font: { size: 10, family: "Inter" }, color: "#b0b7c3" } },
                y: { grid: { color: "#f3f4f6" }, ticks: { font: { size: 10, family: "Inter" }, color: "#b0b7c3", callback: v => fmt(v) } }
            }
        },
        plugins: [{
            afterDraw(ch) {
                const ctx = ch.ctx;
                const yScale = ch.scales.y;
                const xScale = ch.scales.x;
                const y = yScale.getPixelForValue(avg);
                ctx.save();
                ctx.setLineDash([4, 4]);
                ctx.strokeStyle = "#CBD5E1";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(xScale.left, y);
                ctx.lineTo(xScale.right, y);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.font = "11px Inter";
                ctx.fillStyle = "#94A3B8";
                ctx.fillText("ср. " + fmtR(avg), xScale.left + 4, y - 4);
                ctx.restore();
            }
        }]
    });
}

function renderDetailTable() {
    const dates = getDates(
        new Date(new Date(TODAY).getTime() - 30*86400000).toISOString().slice(0,10),
        YESTERDAY
    ).reverse();

    const weekdays = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
    const isAll = selectedBranch === "all";

    if (!isAll) {
        // Филиал: два блока по 15 дней рядом
        const bd = DATA[selectedBranch] || {};
        const left = dates.slice(0, 15);
        const right = dates.slice(15, 30);

        function buildHalf(days) {
            let t = { rev: 0, vis: 0 };
            let rows = '<table class="branch"><thead><tr><th>Дата</th><th>Выручка</th><th>Виз</th><th>Ср.чек</th></tr></thead><tbody>';
            days.forEach(d => {
                const dt = new Date(d + "T00:00:00");
                const wd = weekdays[dt.getDay()];
                const isWe = dt.getDay() === 0 || dt.getDay() === 6;
                const rowCls = isWe ? ' class="weekend"' : '';
                const dv = bd[d] || { revenue: 0, visits: 0 };
                const ac = dv.visits > 0 ? Math.round(dv.revenue / dv.visits) : 0;
                t.rev += dv.revenue;
                t.vis += dv.visits;
                rows += "<tr" + rowCls + "><td>" + d.slice(8,10) + "." + d.slice(5,7) + " " + wd + "</td><td>" + dv.revenue.toLocaleString("ru-RU") + "</td><td>" + dv.visits + "</td><td>" + ac.toLocaleString("ru-RU") + "</td></tr>";
            });
            const tac = t.vis > 0 ? Math.round(t.rev / t.vis) : 0;
            rows += '<tr class="total-row"><td><b>Итого</b></td><td><b>' + t.rev.toLocaleString("ru-RU") + '</b></td><td><b>' + t.vis + '</b></td><td><b>' + tac.toLocaleString("ru-RU") + '</b></td></tr>';
            rows += '</tbody></table>';
            return rows;
        }

        const el = document.getElementById("detail-table");
        el.className = "table-scroll";
        el.innerHTML = '<div class="branch-split"><div>' + buildHalf(left) + '</div><div>' + buildHalf(right) + '</div></div>';
        return;
    }

    // Все: одна таблица на полную ширину
    let html = "<table><thead><tr><th>Дата</th>";
    Object.values(BRANCHES).forEach(b => { html += "<th>" + b.short + "</th>"; });
    html += "<th>ИТОГО</th></tr></thead><tbody>";

    let totals = {};
    Object.keys(BRANCHES).forEach(cid => { totals[cid] = 0; });
    totals.total = 0;

    dates.forEach(d => {
        const dt = new Date(d + "T00:00:00");
        const wd = weekdays[dt.getDay()];
        const isWe = dt.getDay() === 0 || dt.getDay() === 6;
        const rowCls = isWe ? ' class="weekend"' : '';

        html += "<tr" + rowCls + "><td>" + d.slice(8,10) + "." + d.slice(5,7) + " " + wd + "</td>";
        let rowTotal = 0;
        Object.keys(BRANCHES).forEach(cid => {
            const v = (DATA[cid] && DATA[cid][d]) ? DATA[cid][d].revenue : 0;
            html += "<td>" + v.toLocaleString("ru-RU") + "</td>";
            totals[cid] += v;
            rowTotal += v;
        });
        html += '<td style="font-weight:600;color:#1f2937">' + rowTotal.toLocaleString("ru-RU") + "</td>";
        totals.total += rowTotal;
        html += "</tr>";
    });

    html += '<tr class="total-row"><td><b>ИТОГО</b></td>';
    Object.keys(BRANCHES).forEach(cid => { html += "<td><b>" + totals[cid].toLocaleString("ru-RU") + "</b></td>"; });
    html += "<td><b>" + totals.total.toLocaleString("ru-RU") + "</b></td>";
    html += "</tr></tbody></table>";

    const el = document.getElementById("detail-table");
    el.className = "table-scroll scroll";
    el.innerHTML = html;
}

function renderComparison() {
    if (selectedBranch !== "all") {
        document.getElementById("comparison-table").innerHTML = "";
        return;
    }

    let rows = [];
    let tRev = 0, tFc = 0, tVis = 0, tPrev = 0;

    Object.entries(BRANCHES).forEach(([cid, info]) => {
        const curr = sumRangeBranch(cid, FIRST_THIS, YESTERDAY);
        const prev = sumRangeBranch(cid, FIRST_PREV, FIRST_THIS, DAY_OF_MONTH);
        const fc = DAY_OF_MONTH > 0 ? (curr.rev / DAY_OF_MONTH) * DAYS_IN_MONTH : 0;
        const ac = curr.vis > 0 ? curr.rev / curr.vis : 0;
        const delta = prev.rev > 0 ? ((curr.rev / prev.rev) - 1) * 100 : 0;

        tRev += curr.rev; tFc += fc; tVis += curr.vis; tPrev += prev.rev;

        const cls = delta >= 0 ? "positive" : "negative";
        const sign = delta >= 0 ? "+" : "";

        rows.push('<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:' + info.color + ';margin-right:6px"></span>' + info.short + '</td>'
            + '<td>' + fmtR(curr.rev) + '</td><td>' + fmtR(fc) + '</td><td>' + curr.vis.toLocaleString("ru-RU") + '</td><td>' + Math.round(ac).toLocaleString("ru-RU") + ' ₽</td>'
            + '<td class="' + cls + '">' + sign + delta.toFixed(1) + '%</td></tr>');
    });

    const tAc = tVis > 0 ? tRev / tVis : 0;
    const tDelta = tPrev > 0 ? ((tRev / tPrev) - 1) * 100 : 0;
    const tCls = tDelta >= 0 ? "positive" : "negative";
    const tSign = tDelta >= 0 ? "+" : "";

    rows.push('<tr class="total-row"><td><b>СЕТЬ</b></td><td><b>' + fmtR(tRev) + '</b></td><td><b>' + fmtR(tFc) + '</b></td><td><b>' + tVis.toLocaleString("ru-RU") + '</b></td><td><b>' + Math.round(tAc).toLocaleString("ru-RU") + ' ₽</b></td><td class="' + tCls + '"><b>' + tSign + tDelta.toFixed(1) + '%</b></td></tr>');

    document.getElementById("comparison-table").innerHTML = '<table><thead><tr><th>Филиал</th><th>Выручка</th><th>Прогноз</th><th>Визиты</th><th>Ср.чек</th><th>vs пред</th></tr></thead><tbody>' + rows.join("") + '</tbody></table>';
}

function selectBranch(cid) {
    selectedBranch = cid;
    renderAll();
}

function renderAll() {
    renderChips();
    renderKPI();
    renderChart();
    renderDetailTable();
    renderComparison();
}

renderAll();
</script>
