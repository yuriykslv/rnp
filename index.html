function fmt(v) {
    if (v >= 1e6) return (v/1e6).toFixed(1) + "M";
    if (v >= 1e3) return Math.round(v/1e3) + "K";
    return v.toLocaleString("ru-RU");
}
function fmtR(v) { return fmt(v) + " ₽"; }

function getDates(startStr, endStr) {
    const dates = [];
    let d = new Date(startStr);
    const end = new Date(endStr);
    while (d <= end) {
        dates.push(d.toISOString().slice(0,10));
        d.setDate(d.getDate() + 1);
    }
    return dates;
}

function branchIds() {
    if (selectedBranch === "all") return Object.keys(BRANCHES);
    return [selectedBranch];
}

function sumRange(start, end, filterDay) {
    let rev = 0, vis = 0;
    branchIds().forEach(cid => {
        const bd = DATA[cid] || {};
        Object.entries(bd).forEach(([d, v]) => {
            if (d >= start && d <= end) {
                if (filterDay && parseInt(d.slice(8,10)) > filterDay) return;
                rev += v.revenue;
                vis += v.visits;
            }
        });
    });
    return { rev, vis };
}

function sumRangeBranch(cid, start, end, filterDay) {
    let rev = 0, vis = 0;
    const bd = DATA[cid] || {};
    Object.entries(bd).forEach(([d, v]) => {
        if (d >= start && d <= end) {
            if (filterDay && parseInt(d.slice(8,10)) > filterDay) return;
            rev += v.revenue;
            vis += v.visits;
        }
    });
    return { rev, vis };
}

function renderChips() {

    let html = '<span class="chip ' + (selectedBranch === "all" ? "active" : "") + '" onclick="selectBranch(\'all\')">Все</span>';
    Object.entries(BRANCHES).forEach(([cid, info]) => {
        html += '<span class="chip ' + (selectedBranch === cid ? "active" : "") + '" onclick="selectBranch(\'' + cid + '\')">' + info.name + '</span>';
    });
    el.innerHTML = html;
}

function renderKPI() {
    const curr = sumRange(FIRST_THIS, YESTERDAY);
    const prev = sumRange(FIRST_PREV, FIRST_THIS, DAY_OF_MONTH);
    const forecast = DAY_OF_MONTH > 0 ? (curr.rev / DAY_OF_MONTH) * DAYS_IN_MONTH : 0;
    const avgCheck = curr.vis > 0 ? curr.rev / curr.vis : 0;
    const delta = prev.rev > 0 ? ((curr.rev / prev.rev) - 1) * 100 : 0;
    const vpd = DAY_OF_MONTH > 0 ? Math.round(curr.vis / DAY_OF_MONTH) : 0;

    const netCurr = (() => {
        let r = 0, v = 0;
        Object.keys(BRANCHES).forEach(cid => {
            const bd = DATA[cid] || {};
            Object.entries(bd).forEach(([d, val]) => {
                if (d >= FIRST_THIS && d <= YESTERDAY) { r += val.revenue; v += val.visits; }
            });
        });
        return { rev: r, vis: v };
    })();

    const dSign = delta >= 0 ? "+" : "";
    const dBg = delta >= 0 ? "#86EFAC" : "#FCA5A5";

    document.getElementById("kpi").innerHTML = `

                const yScale = ch.scales.y;
                const xScale = ch.scales.x;
                const y = yScale.getPixelForValue(avg);
                ctx.save();
                ctx.setLineDash([4, 4]);
                ctx.strokeStyle = "#CBD5E1";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(xScale.left, y);
                ctx.lineTo(xScale.right, y);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.font = "11px Inter";
                ctx.fillStyle = "#94A3B8";
                ctx.fillText("ср. " + fmtR(avg), xScale.left + 4, y - 4);
                ctx.restore();
            },
            afterDatasetsDraw(ch) {
                const ctx = ch.ctx;
                const meta = ch.getDatasetMeta(0);
                ctx.save();
                ctx.font = "bold 9px Inter";
                ctx.fillStyle = "#6B7280";
                ctx.textAlign = "center";
                ctx.textBaseline = "bottom";
                meta.data.forEach((bar, i) => {
                    const m = masters[i];
                    if (m && m > 0) {
                        ctx.fillText(m, bar.x, bar.y - 2);
                    }
                });
                ctx.restore();
            }
        }]
    });
}

function renderComparison() {
    if (selectedBranch !== "all") {
        document.getElementById("comparison-table").innerHTML = "";
        return;
    }

    const d30ago = new Date(new Date(TODAY).getTime() - 30*86400000).toISOString().slice(0,10);
    let rows = [];
    let tRev = 0, tFc = 0, tR30 = 0, tVis = 0, tPrev = 0;

    Object.entries(BRANCHES).forEach(([cid, info]) => {
        const curr = sumRangeBranch(cid, FIRST_THIS, YESTERDAY);
        const prev = sumRangeBranch(cid, FIRST_PREV, FIRST_THIS, DAY_OF_MONTH);
        const fc = DAY_OF_MONTH > 0 ? (curr.rev / DAY_OF_MONTH) * DAYS_IN_MONTH : 0;
        const r30 = sumRangeBranch(cid, d30ago, YESTERDAY).rev;
        const ac = curr.vis > 0 ? curr.rev / curr.vis : 0;
        const delta = prev.rev > 0 ? ((curr.rev / prev.rev) - 1) * 100 : 0;

        tRev += curr.rev; tFc += fc; tR30 += r30; tVis += curr.vis; tPrev += prev.rev;

        const cls = delta >= 0 ? "positive" : "negative";
        const sign = delta >= 0 ? "+" : "";

        rows.push('<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:' + info.color + ';margin-right:6px"></span>' + info.short + '</td>'
            + '<td>' + fmtR(curr.rev) + '</td>'

            + '<td>' + fmtR(r30) + '</td>'
            + '<td>' + curr.vis.toLocaleString("ru-RU") + '</td><td>' + Math.round(ac).toLocaleString("ru-RU") + ' ₽</td>'
            + '<td class="' + cls + '">' + sign + delta.toFixed(1) + '%</td></tr>');
    });

    const tAc = tVis > 0 ? tRev / tVis : 0;
    const tDelta = tPrev > 0 ? ((tRev / tPrev) - 1) * 100 : 0;
    const tCls = tDelta >= 0 ? "positive" : "negative";
    const tSign = tDelta >= 0 ? "+" : "";

    rows.push('<tr class="total-row"><td><b>СЕТЬ</b></td><td><b>' + fmtR(tRev) + '</b></td><td><b>' + fmtR(tFc) + ' <span style="font-size:0.7em;color:#9ca3af">средн.</span></b></td><td><b>' + fmtR(tR30) + '</b></td><td><b>' + tVis.toLocaleString("ru-RU") + '</b></td><td><b>' + Math.round(tAc).toLocaleString("ru-RU") + ' ₽</b></td><td class="' + tCls + '"><b>' + tSign + tDelta.toFixed(1) + '%</b></td></tr>');

    document.getElementById("comparison-table").innerHTML = '<table><thead><tr><th>Филиал</th><th>Выручка</th><th>Прогноз <span style="font-size:0.8em;color:#9ca3af">средн.</span></th><th>Выручка <span style="font-size:0.8em;color:#9ca3af">30д</span></th><th>Визиты</th><th>Ср.чек</th><th>vs пред</th></tr></thead><tbody>' + rows.join("") + '</tbody></table>';
}

/* --- P&L --- */
function getPnlMonths(n) {
    const months = [];
    let y = parseInt(TODAY.slice(0,4)), m = parseInt(TODAY.slice(5,7));
    for (let i = 0; i < n; i++) {
        months.push(y + "-" + String(m).padStart(2,"0"));
        m--; if (m < 1) { m = 12; y--; }
    }
    return months;
}

function fmtMonth(ym) {
    const m = parseInt(ym.slice(5,7));
    return MONTH_NAMES[m-1] + " " + ym.slice(2,4);
}

function pnlForMonth(month) {
    const result = {};
    branchIds().forEach(cid => {
        const bd = PNL_DATA[cid];
        if (!bd || !bd[month]) return;
        Object.entries(bd[month]).forEach(([cat, val]) => {
            result[cat] = (result[cat] || 0) + val;
        });
    });
    return result;
}

function pnlTotals(data) {
    let income = 0, expense = 0;
    Object.entries(data).forEach(([cat, val]) => {
        if (INCOME_CATS_SET.has(cat)) income += val;
        else expense += Math.abs(val);
    });
    return { income, expense, profit: income - expense };
}

function isMonthComplete(month) {
    const data = pnlForMonth(month);
    const t = pnlTotals(data);
    return t.expense > t.income * 0.1;
}

function getKpiMonth() {
    const months = getPnlMonths(3);
    for (const m of months) {
        if (isMonthComplete(m)) return m;
    }
    return months[1];
}

/* --- Хранение данных: GitHub Gist + localStorage fallback --- */
const GIST_ID = "9cdeb10664d67d9b8b85b28d448c7e9c";
let _gistData = { forecast: {}, family: {} };
let _gistLoaded = false;
let _gistSaveTimer = null;
let _fcSaving = false;

function getGistToken() { return localStorage.getItem("rnp_gh_token") || ""; }

async function gistLoad() {
    const token = getGistToken();
    if (!token) {
        // Fallback: load from localStorage
        try { _gistData = JSON.parse(localStorage.getItem("rnp_data")) || { forecast: {}, family: {} }; } catch(e) {}
        _gistLoaded = true;
        return;
    }
    try {
        const r = await fetch("https://api.github.com/gists/" + GIST_ID, {
            headers: { "Authorization": "token " + token }
        });
        if (r.ok) {
            const g = await r.json();
            const content = g.files["rnp-data.json"]?.content;
            if (content) {
                _gistData = JSON.parse(content);
                localStorage.setItem("rnp_data", content);
            }
        }
    } catch(e) { console.error("Gist load error:", e); }
    _gistLoaded = true;
}

/* Авто-подгрузка изменений из Gist каждые 30 сек */
let _gistPollTimer = null;
function gistStartPolling() {
    if (_gistPollTimer || !getGistToken()) return;
    _gistPollTimer = setInterval(async () => {
        if (_gistSaveTimer) return; // не проверять пока идёт сохранение
        try {
            const r = await fetch("https://api.github.com/gists/" + GIST_ID, {
                headers: { "Authorization": "token " + getGistToken() }
            });
            if (!r.ok) return;
            const g = await r.json();
            const content = g.files["rnp-data.json"]?.content;
            if (!content) return;
            const remote = JSON.parse(content);
            const localStr = JSON.stringify(_gistData);
            const remoteStr = JSON.stringify(remote);
            if (localStr !== remoteStr) {
                _gistData = remote;
                localStorage.setItem("rnp_data", content);
                renderAll();
                console.log("Gist: данные обновлены от другого пользователя");
            }
        } catch(e) {}
    }, 30000);
}

function showTokenDialog() {
    const current = getGistToken();
    const msg = current
        ? "Токен установлен (☁ синхронизация активна).\n\nВведите новый токен или оставьте пустым для удаления:"
        : "Для синхронизации данных между устройствами нужен GitHub token.\n\nВведите токен:";
    const t = prompt(msg, "");
    if (t === null) return; // отмена
    if (t === "") {

            localStorage.removeItem("rnp_gh_token");

    } else {
        localStorage.setItem("rnp_gh_token", t);

    }
}

function updateTokenStatus() {

    if (!el) return;
    if (getGistToken()) {
        el.textContent = "☁";
        el.title = "Облачная синхронизация активна (нажми для настройки)";
        el.style.color = "#16a34a";

        el.title = "Нажми чтобы подключить облачную синхронизацию";
        el.style.color = "#f59e0b";
    }
}

function gistSaveDebounced() {
    localStorage.setItem("rnp_data", JSON.stringify(_gistData));
    if (_gistSaveTimer) clearTimeout(_gistSaveTimer);
    _gistSaveTimer = setTimeout(async () => {
        await gistSaveNow();
        _gistSaveTimer = null;
    }, 2000);
}

async function gistSaveNow() {
    const token = getGistToken();
    if (!token) return;
    try {
        // Сначала читаем актуальные данные из Gist, чтобы не затереть чужие изменения
        const rGet = await fetch("https://api.github.com/gists/" + GIST_ID, {
            headers: { "Authorization": "token " + token }
        });
        if (rGet.ok) {
            const g = await rGet.json();
            const content = g.files["rnp-data.json"]?.content;
            if (content) {
                const remote = JSON.parse(content);
                // Мержим: для каждого ключа forecast берём локальную версию если она есть, иначе remote
                const merged = { forecast: {}, family: {} };
                // Forecast: merge по ключам (branch+month)
                const allFcKeys = new Set([...Object.keys(remote.forecast || {}), ...Object.keys(_gistData.forecast || {})]);
                allFcKeys.forEach(k => {
                    const loc = (_gistData.forecast || {})[k];
                    const rem = (remote.forecast || {})[k];
                    if (loc && rem) {
                        // Merge категорий внутри ключа: локальные перезаписывают remote
                        merged.forecast[k] = { ...rem, ...loc };
                    } else {
                        merged.forecast[k] = loc || rem;
                    }
                });
                // Family: merge по месяцам
                const allFamKeys = new Set([...Object.keys(remote.family || {}), ...Object.keys(_gistData.family || {})]);
                allFamKeys.forEach(k => {
                    merged.family[k] = (_gistData.family || {})[k] ?? (remote.family || {})[k];
                });
                _gistData = merged;
                localStorage.setItem("rnp_data", JSON.stringify(merged));
            }
        }
        // Теперь сохраняем merged данные
        await fetch("https://api.github.com/gists/" + GIST_ID, {
            method: "PATCH",
            headers: { "Authorization": "token " + token, "Content-Type": "application/json" },
            body: JSON.stringify({ files: { "rnp-data.json": { content: JSON.stringify(_gistData, null, 2) } } })
        });
    } catch(e) { console.error("Gist save error:", e); }
}

/* --- Ручная синхронизация: триггер GitHub Actions --- */
async function triggerSync() {
    const btn = document.getElementById("sync-btn");
    const token = getGistToken();
    if (!token) {
        const t = prompt("Для синхронизации нужен GitHub token (scope: repo + gist).\nВведите токен:");
        if (!t) return;
        localStorage.setItem("rnp_gh_token", t);
        return triggerSync();
    }
    btn.classList.add("spinning");
    btn.title = "Запуск синхронизации...";
    try {
        const r = await fetch("https://api.github.com/repos/yuriykslv/rnp-dashboard/actions/workflows/update.yml/dispatches", {
            method: "POST",
            headers: { "Authorization": "token " + token, "Content-Type": "application/json" },
            body: JSON.stringify({ ref: "main" })
        });
        if (r.status === 204) {
            btn.title = "Синхронизация запущена! Страница обновится через ~3 мин";
            btn.classList.remove("spinning");
            btn.textContent = "✓";
            btn.style.color = "#16a34a";
            setTimeout(() => { btn.textContent = "↻"; btn.style.color = ""; btn.title = "Обновить данные из YClients"; }, 10000);
            // Авто-обновление страницы через 3 мин
            setTimeout(() => location.reload(), 180000);
        } else if (r.status === 401 || r.status === 403) {
            btn.classList.remove("spinning");
            const t = prompt("Токен не имеет прав (нужен scope: repo).\nВведите новый токен:");
            if (t) { localStorage.setItem("rnp_gh_token", t); triggerSync(); }
        } else {
            throw new Error("HTTP " + r.status);
        }
    } catch(e) {
        btn.classList.remove("spinning");
        btn.title = "Ошибка: " + e.message;
        btn.style.color = "#dc2626";
        setTimeout(() => { btn.style.color = ""; btn.title = "Обновить данные из YClients"; }, 5000);
    }
}

function fcKey(month) {
    return month + "_" + (selectedBranch === "all" ? "all" : selectedBranch);
}
function loadForecast(month) {
    if (selectedBranch !== "all") {
        return _gistData.forecast[fcKey(month)] || {};
    }
    // «Все» — только суммируем прогнозы по филиалам (без _all, чтобы не задваивать)
    const merged = {};
    for (const cid of Object.keys(BRANCHES)) {
        const brData = _gistData.forecast[month + "_" + cid] || {};
        for (const [cat, val] of Object.entries(brData)) merged[cat] = (merged[cat] || 0) + val;
    }
    return merged;
}
function saveForecast(month, data) {
    _gistData.forecast[fcKey(month)] = data;
    gistSaveDebounced();
}
function setFcValue(month, cat, val) {
    const fc = loadForecast(month);
    fc[cat] = val;
    saveForecast(month, fc);
    _fcSaving = true;
    renderPnlTable();
    _fcSaving = false;
}

        });
        rowHtml += '</tr>';
        incomeRows.push(rowHtml);
    });

    // Заголовок «Доходы» с итогами
    html += '<tr class="group-header income"><td>Доходы</td>';
    FORECAST_MONTHS.forEach((fm, fi) => {
        html += '<td style="font-weight:700;font-style:italic">' + fmt(fcIncomeTotals[fi]) + '</td>';
    });
    incomeTotals.forEach(v => { html += '<td style="font-weight:700">' + fmt(Math.round(v)) + '</td>'; });
    html += '</tr>';
    html += incomeRows.join("");

    // Считаем итоги расходов
    let expenseTotals = months.map(() => 0);
    let fcExpTotals = FORECAST_MONTHS.map(() => 0);
    let expenseRows = [];
    EXPENSE_ORDER.forEach(cat => {
        let hasData = false;
        months.forEach((m, i) => { if (monthData[i][cat]) hasData = true; });
        let hasFc = false;
        fcData.forEach(fd => { if (fd.hasOwnProperty(cat)) hasFc = true; });
        const defVal = fcGetDefault(cat);
        if (!hasData && !hasFc && !defVal && FORECAST_MONTHS.length === 0) return;
        let rowHtml = '<tr><td style="text-align:left;padding-left:16px">' + cat + '</td>';
        FORECAST_MONTHS.forEach((fm, fi) => {
            const hasFcVal = fcData[fi].hasOwnProperty(cat);
            const fcVal = hasFcVal ? fcData[fi][cat] : 0;
            fcExpTotals[fi] += fcVal;
            const eCat = cat.replace(/'/g, "\\'");
            rowHtml += '<td class="fc-col fc-cell negative" onclick="fcEdit(this,\'' + eCat + '\',\'' + fm + '\')">';
            if (hasFcVal) {
                rowHtml += fcVal === 0 ? '0' : fmt(fcVal);
            } else if (defVal > 0) {
                rowHtml += '<span style="color:#c4b5fd;font-weight:400;cursor:pointer">' + fmt(defVal) + '?</span>';
            } else {
                rowHtml += '<span style="color:#d1d5db;font-weight:400;cursor:pointer">—</span>';
            }
            rowHtml += '</td>';
        });
        months.forEach((m, i) => {
            const v = monthData[i][cat] || 0;
            expenseTotals[i] += v;
            const absV = Math.round(Math.abs(v));
            const pct = incomeTotals[i] > 0 ? (Math.abs(v) / incomeTotals[i] * 100) : 0;
            const pctStr = v ? ' <span style="font-size:0.6em;color:#9ca3af">' + pct.toFixed(0) + '%</span>' : '';
            rowHtml += '<td class="negative">' + (v ? fmt(absV) + pctStr : '—') + '</td>';
        });
        rowHtml += '</tr>';
        expenseRows.push(rowHtml);
    });

    // Заголовок «Расходы» с итогами
    html += '<tr class="group-header expense"><td>Расходы</td>';
    FORECAST_MONTHS.forEach((fm, fi) => {
        const t = fcExpTotals[fi];
        const pct = fcIncomeTotals[fi] > 0 ? (t / fcIncomeTotals[fi] * 100) : 0;
        html += '<td style="font-weight:700">' + (t > 0 ? fmt(t) + ' <span style="font-size:0.6em;color:#9ca3af">' + pct.toFixed(0) + '%</span>' : '—') + '</td>';
    });
    expenseTotals.forEach((v, i) => {
        const pct = incomeTotals[i] > 0 ? (Math.abs(v) / incomeTotals[i] * 100) : 0;
        html += '<td style="font-weight:700">' + fmt(Math.round(Math.abs(v))) + ' <span style="font-size:0.6em;color:#9ca3af">' + pct.toFixed(0) + '%</span></td>';
    });
    html += '</tr>';
    html += expenseRows.join("");

    // Семейные расходы (только «Все»)
    let famTotals = months.map(() => 0);
    let fcFamTotals = FORECAST_MONTHS.map(() => 0);
    if (selectedBranch === "all") {
        html += '<tr><td style="text-align:left;padding-left:16px;color:#9ca3af;font-style:italic">Семейные расходы</td>';
        const fam = _gistData.family || {};
        FORECAST_MONTHS.forEach((fm, fi) => {
            const val = fam[fm] || 0;
            fcFamTotals[fi] = val;
            html += '<td class="fc-col fc-cell negative" style="font-style:italic" onclick="famEdit(this,\'' + fm + '\')">';
            html += val > 0 ? fmt(val) : '<span style="color:#d1d5db;cursor:pointer">—</span>';
            html += '</td>';
        });
        months.forEach((m, i) => {
            const val = fam[m] || 0;
            famTotals[i] = val;
            html += '<td class="fc-cell negative" style="font-style:italic;cursor:pointer" onclick="famEdit(this,\'' + m + '\')">';
            html += val > 0 ? fmt(val) : '<span style="color:#d1d5db;cursor:pointer">—</span>';
            html += '</td>';
        });
        html += '</tr>';
    }

    // Прибыль (доходы - расходы, без семейных)
    html += '<tr class="profit-row"><td style="text-align:left">ПРИБЫЛЬ</td>';
    FORECAST_MONTHS.forEach((fm, fi) => {
        const p = fcIncomeTotals[fi] - fcExpTotals[fi];
        const cls = p >= 0 ? 'positive' : 'negative';
        html += '<td class="fc-col ' + cls + '" style="font-style:italic">' + (fcExpTotals[fi] > 0 ? fmt(Math.round(Math.abs(p))) + (p < 0 ? ' ▼' : '') : '—') + '</td>';
    });
    months.forEach((m, i) => {
        const profit = incomeTotals[i] + expenseTotals[i];
        const cls = profit >= 0 ? "positive" : "negative";
        html += '<td class="' + cls + '">' + fmt(Math.round(Math.abs(profit))) + (profit < 0 ? ' ▼' : '') + '</td>';
    });
    html += '</tr>';

    // Маржа
    html += '<tr><td style="text-align:left;color:#9ca3af;font-size:11px">Маржа %</td>';
    FORECAST_MONTHS.forEach((fm, fi) => {
        const p = fcIncomeTotals[fi] - fcExpTotals[fi];
        const mg = fcIncomeTotals[fi] > 0 && fcExpTotals[fi] > 0 ? (p / fcIncomeTotals[fi] * 100) : 0;
        html += '<td class="fc-col" style="font-size:11px;font-style:italic;color:' + (mg >= 0 ? '#16a34a' : '#b45454') + '">' + (fcExpTotals[fi] > 0 ? mg.toFixed(1) + '%' : '—') + '</td>';
    });
    months.forEach((m, i) => {
        const profit = incomeTotals[i] + expenseTotals[i];
        const margin = incomeTotals[i] > 0 ? (profit / incomeTotals[i] * 100) : 0;
        const cls = margin >= 0 ? "positive" : "negative";
        html += '<td class="' + cls + '" style="font-size:11px">' + margin.toFixed(1) + '%</td>';
    });
    html += '</tr>';

    // Свободный кэш (только «Все»: прибыль - семейные расходы)
    if (selectedBranch === "all") {
        html += '<tr class="profit-row"><td style="text-align:left">СВОБОДНЫЙ КЭШ</td>';
        FORECAST_MONTHS.forEach((fm, fi) => {
            const p = fcIncomeTotals[fi] - fcExpTotals[fi] - fcFamTotals[fi];
            const cls = p >= 0 ? 'positive' : 'negative';
            html += '<td class="fc-col ' + cls + '" style="font-style:italic">' + (fcExpTotals[fi] > 0 || fcFamTotals[fi] > 0 ? fmt(Math.round(Math.abs(p))) + (p < 0 ? ' ▼' : '') : '—') + '</td>';
        });
        months.forEach((m, i) => {
            const cash = incomeTotals[i] + expenseTotals[i] - famTotals[i];
            const cls = cash >= 0 ? "positive" : "negative";
            html += '<td class="' + cls + '">' + fmt(Math.round(Math.abs(cash))) + (cash < 0 ? ' ▼' : '') + '</td>';
        });
        html += '</tr>';
    }

    html += '</tbody></table>';
    document.getElementById("pnl-table").innerHTML = html;
}

function fcIncDefault(cat) {
    const months = getPnlMonths(6);
    let sum = 0, cnt = 0;
    for (const m of months) {
        if (!isMonthComplete(m)) continue;
        const data = pnlForMonth(m);
        if (data[cat] && data[cat] > 0) { sum += data[cat]; cnt++; }
        if (cnt >= 3) break;
    }
    return cnt > 0 ? Math.round(sum / cnt) : 0;
}

function fcGetDefault(cat) {
    const months = getPnlMonths(6);
    let sum = 0, cnt = 0;
    for (const m of months) {
        if (!isMonthComplete(m)) continue;
        const data = pnlForMonth(m);
        if (data[cat]) { sum += Math.abs(data[cat]); cnt++; }
        if (cnt >= 3) break;
    }
    return cnt > 0 ? Math.round(sum / cnt) : 0;
}

function fcEdit(td, cat, month) {
    if (_fcSaving) return;
    const fc = loadForecast(month);
    const cur = fc.hasOwnProperty(cat) ? fc[cat] : fcGetDefault(cat);
    const eCat = cat.replace(/'/g, "\'");
    td.innerHTML = '<input type="number" value="' + cur + '" onblur="fcSave(this,\'' + eCat + '\',\'' + month + '\')" onkeydown="if(event.key===\'Enter\')this.blur()" autofocus />';
    const inp = td.querySelector('input');
    inp.focus();
    inp.select();
}
function fcSave(input, cat, month) {
    if (_fcSaving) return;
    if (!input.parentNode) return;
    const raw = input.value.trim();
    if (raw === '') {
        const fc = loadForecast(month);
        delete fc[cat];
        saveForecast(month, fc);
        _fcSaving = true;
        renderPnlTable();
        _fcSaving = false;
    } else {
        const val = parseInt(raw) || 0;
        setFcValue(month, cat, val);
    }
}

function famEdit(td, month) {
    if (_fcSaving) return;
    const fam = _gistData.family || {};
    const cur = fam[month] || '';
    td.innerHTML = '<input type="number" value="' + cur + '" onblur="famSave(this,\'' + month + '\')" onkeydown="if(event.key===\'Enter\')this.blur()" autofocus />';
    const inp = td.querySelector('input');
    inp.focus();
    inp.select();
}
function famSave(input, month) {
    if (_fcSaving) return;
    if (!input.parentNode) return;
    const raw = input.value.trim();
    if (!_gistData.family) _gistData.family = {};
    if (raw === '') {
        delete _gistData.family[month];
    } else {
        _gistData.family[month] = parseInt(raw) || 0;
    }
    gistSaveDebounced();
    _fcSaving = true;
    renderPnlTable();
    _fcSaving = false;
}

function fcFillAll() {
    FORECAST_MONTHS.forEach(fm => {
        const fc = loadForecast(fm);
        // Доходы
        INCOME_ORDER.forEach(cat => {
            if (!fc.hasOwnProperty(cat)) {
                const def = cat === "Оказание услуг" ? Math.round(getRevenueForecast()) : fcIncDefault(cat);
                if (def > 0) fc[cat] = def;
            }
        });
        // Расходы
        EXPENSE_ORDER.forEach(cat => {
            if (!fc.hasOwnProperty(cat)) {
                const def = fcGetDefault(cat);
                if (def > 0) fc[cat] = def;
            }
        });
        saveForecast(fm, fc);
    });
    renderPnlTable();
}


function renderPnlComparison() {
    if (selectedBranch !== "all") {
        document.getElementById("pnl-comparison").innerHTML = "";
        return;
    }
    // Находим последний завершённый месяц (с заполненными расходами)
    const allMonths = getPnlMonths(12);
    let compMonth = allMonths[0];
    for (const m of allMonths) {
        if (isMonthComplete(m)) { compMonth = m; break; }
    }
    let rows = [];
    let tInc = 0, tExp = 0;

    Object.entries(BRANCHES).forEach(([cid, info]) => {
        const bd = PNL_DATA[cid];
        const md = (bd && bd[compMonth]) || {};
        let inc = 0, exp = 0;
        Object.entries(md).forEach(([cat, val]) => {
            if (INCOME_CATS_SET.has(cat)) inc += val;
            else exp += Math.abs(val);
        });
        const profit = inc - exp;
        const margin = inc > 0 ? (profit / inc * 100) : 0;
        tInc += inc; tExp += exp;
        const cls = profit >= 0 ? "positive" : "negative";
        rows.push('<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:' + info.color + ';margin-right:6px"></span>' + info.short + '</td>'
            + '<td>' + fmtR(inc) + '</td><td>' + fmtR(exp) + '</td><td class="' + cls + '">' + fmtR(profit) + '</td><td>' + margin.toFixed(1) + '%</td></tr>');
    });

    const tProfit = tInc - tExp;
    const tMargin = tInc > 0 ? (tProfit / tInc * 100) : 0;
    const tCls = tProfit >= 0 ? "positive" : "negative";
    rows.push('<tr class="total-row"><td><b>СЕТЬ</b></td><td><b>' + fmtR(tInc) + '</b></td><td><b>' + fmtR(tExp) + '</b></td><td class="' + tCls + '"><b>' + fmtR(tProfit) + '</b></td><td><b>' + tMargin.toFixed(1) + '%</b></td></tr>');

    document.getElementById("pnl-comparison").innerHTML = '<div style="font-size:11px;color:#9ca3af;margin-bottom:4px">Сравнение филиалов: ' + fmtMonth(compMonth) + '</div><table><thead><tr><th>Филиал</th><th>Доходы</th><th>Расходы</th><th>Прибыль</th><th>Маржа</th></tr></thead><tbody>' + rows.join("") + '</tbody></table>';
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(t => { if (t.textContent === (tab === 'revenue' ? 'Выручка' : 'P&L')) t.classList.add('active'); });
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(tab + '-view').classList.add('active');
    renderAll();
}

function renderAll() {
    renderChips();
    if (currentTab === "revenue") {
        renderKPI();
        renderChart();
        renderDetailTable();
        renderComparison();
    } else {
        renderPnlKPI();
        renderPnlTable();
        renderPnlComparison();
    }
}

/* --- Init --- */
(async function() {
    await gistLoad();
    // Ждём полной отрисовки DOM перед рендером графика
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            renderAll();
            updateTokenStatus();
            gistStartPolling();
        });
    });
})();
</script>
